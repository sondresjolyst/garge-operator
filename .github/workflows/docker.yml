name: 🔨 Build and Push Docker Image

on:
  pull_request:
  push:
    branches: [development]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag for the Docker image"
        type: string
        required: true
  workflow_call:
    inputs:
      tag:
        description: "Tag for the Docker image"
        type: string
        required: true
    secrets:
      DOCKER_PASSWORD:
        required: true
      GARGE_PAT:
        required: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

  dev:
    needs: test
    if: github.ref == 'refs/heads/development'
    uses: equinor/ops-actions/.github/workflows/docker.yml@f52d0091e07205220002c7abd2c82cab44143d26 # v9.37.3
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      environment: dev
      registry: registry.hub.docker.com
      username: sondresjo
      repository: sondresjo/garge-operator
      tag: dev

  prod:
    needs: test
    if: inputs.tag != ''
    uses: equinor/ops-actions/.github/workflows/docker.yml@f52d0091e07205220002c7abd2c82cab44143d26 # v9.37.3
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      environment: prod
      registry: registry.hub.docker.com
      username: sondresjo
      repository: sondresjo/garge-operator
      tag: ${{ inputs.tag }}

  update-chart:
    needs: prod
    if: inputs.tag != ''
    uses: sondresjolyst/garge/.github/workflows/update-chart.yml@main
    secrets:
      GARGE_PAT: ${{ secrets.GARGE_PAT }}
    with:
      chart_name: garge-operator
      tag: ${{ inputs.tag }}
