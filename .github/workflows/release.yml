name: 🚀 Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions: {}

jobs:
  release-please:
    name: Release Please
    if: ${{ github.event_name == 'push' }}
    uses: equinor/ops-actions/.github/workflows/release-please.yml@492516f19214a297c5f9ba6526bedb2a42c775d1 # v9.38.1
    permissions:
      contents: write
      pull-requests: write
      issues: write
    with:
      release_type: simple

  deploy-dev:
    name: Deploy Dev
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/docker.yml
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      tag: dev
      environment: dev
      tag_latest: false

  deploy-prod:
    name: Deploy Prod
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/docker.yml
    secrets:
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
      environment: prod
      tag_latest: true

  update-chart:
    name: Update Chart
    needs: [release-please, deploy-prod]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
    uses: sondresjolyst/garge/.github/workflows/update-chart.yml@main
    secrets:
      GARGE_PAT: ${{ secrets.GARGE_PAT }}
    with:
      chart_name: garge-operator
      tag: ${{ needs.release-please.outputs.tag_name }}
